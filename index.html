document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;color:#2fd4e6;\">01<\u002Fdiv>\n      <div style=\"font-size:13px;letter-spacing:0.28em;text-transform:uppercase;color:#7f888e;font-family:'JetBrains Mono',monospace;\">What's humming right now<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;\">\n\n      <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"6\">\n        <div style=\"background:#0e1014;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px 24px 22px;transition:border-color .18s,transform .18s;\" style-hover=\"border-color:rgba(47,212,230,0.4);transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#6f777c;\">{{ svc.tag }}<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ svc.statusColor }};\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ svc.statusColor }};\"><\u002Fspan>{{ svc.status }}\n            <\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:21px;font-weight:600;margin-bottom:8px;\">{{ svc.name }}<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#8b9499;margin-bottom:18px;\">{{ svc.desc }}<\u002Fp>\n          <div style=\"display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f777c;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px;\">\n            <span>up {{ svc.uptime }}<\u002Fspan>\n            <span>{{ svc.meta }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= NOTES ================= -->\n  <section id=\"notes\" style=\"max-width:1080px;margin:0 auto;padding:80px 32px 40px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:36px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;color:#2fd4e6;\">02<\u002Fdiv>\n      <div style=\"font-size:13px;letter-spacing:0.28em;text-transform:uppercase;color:#7f888e;font-family:'JetBrains Mono',monospace;\">Lab notes<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;\">\n      <sc-for list=\"{{ notes }}\" as=\"note\" hint-placeholder-count=\"4\">\n        <a href=\"#notes\" style=\"display:grid;grid-template-columns:130px 1fr auto;gap:24px;align-items:baseline;padding:22px 8px;border-top:1px solid rgba(255,255,255,0.08);transition:background .15s,padding-left .15s;\" style-hover=\"background:rgba(47,212,230,0.04);padding-left:18px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6f777c;letter-spacing:0.08em;\">{{ note.date }}<\u002Fspan>\n          <span style=\"font-size:18px;font-weight:500;color:#eef1f3;\">{{ note.title }}<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#2fd4e6;\">{{ note.tag }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n      <div style=\"border-top:1px solid rgba(255,255,255,0.08);\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= RACK / GALLERY ================= -->\n  <section id=\"rack\" style=\"max-width:1080px;margin:0 auto;padding:80px 32px 40px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:36px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;color:#2fd4e6;\">03<\u002Fdiv>\n      <div style=\"font-size:13px;letter-spacing:0.28em;text-transform:uppercase;color:#7f888e;font-family:'JetBrains Mono',monospace;\">The rack, in the flesh<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:18px;\">\n      <div style=\"aspect-ratio:16/10;border-radius:14px;border:1px solid rgba(47,212,230,0.18);background-color:#0b0d10;background-image:repeating-linear-gradient(135deg,rgba(47,212,230,0.05) 0 12px,transparent 12px 24px);display:flex;align-items:center;justify-content:center;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:#5c7d82;\">[ photo of the rack ]<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-rows:1fr 1fr;gap:18px;\">\n        <div style=\"border-radius:14px;border:1px solid rgba(255,255,255,0.08);background-color:#0b0d10;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.04) 0 12px,transparent 12px 24px);display:flex;align-items:center;justify-content:center;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:#5c656b;\">[ the mess of cables ]<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"border-radius:14px;border:1px solid rgba(255,255,255,0.08);background-color:#0b0d10;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.04) 0 12px,transparent 12px 24px);display:flex;align-items:center;justify-content:center;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.14em;color:#5c656b;\">[ blinkenlights ]<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= CTA STRIP ================= -->\n  <section style=\"max-width:1080px;margin:80px auto 0;padding:0 32px;\">\n    <div style=\"position:relative;overflow:hidden;background:linear-gradient(135deg,#06363d 0%,#0a0c0f 72%);border:1px solid rgba(47,212,230,0.22);border-radius:18px;padding:60px 44px;text-align:center;\">\n      <svg viewBox=\"0 0 332.97 247.83\" style=\"position:absolute;left:-40px;bottom:-70px;height:280px;color:rgba(47,212,230,0.07);pointer-events:none;\"><use href=\"#zvMark\"><\u002Fuse><\u002Fsvg>\n      <div style=\"position:relative;\">\n        <h2 style=\"font-size:clamp(26px,4vw,40px);font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Want to poke at something?<\u002Fh2>\n        <p style=\"font-size:16px;color:#c3cacd;max-width:44ch;margin:0 auto 28px;line-height:1.55;\">Half of this is held together with duct tape and cron jobs. Say hi — or tell me what's on fire.<\u002Fp>\n        <a href=\"mailto:hi@zilvee.com\" style=\"display:inline-flex;align-items:center;gap:10px;background:#2fd4e6;color:#06222a;font-weight:600;font-size:15px;padding:14px 28px;border-radius:10px;transition:transform .15s,box-shadow .15s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 10px 30px rgba(47,212,230,0.3);\">hi@zilvee.com<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"max-width:1080px;margin:0 auto;padding:70px 32px 90px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <svg height=\"22\" viewBox=\"0 0 332.97 247.83\" style=\"display:block;color:#2fd4e6;\"><use href=\"#zvMark\"><\u002Fuse><\u002Fsvg>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;color:#6f777c;\">built in a closet somewhere · {{ year }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:26px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#9aa3a8;\">\n      <a href=\"#top\" style=\"transition:color .15s;\" style-hover=\"color:#2fd4e6;\">GitHub<\u002Fa>\n      <a href=\"#top\" style=\"transition:color .15s;\" style-hover=\"color:#2fd4e6;\">RSS<\u002Fa>\n      <a href=\"#top\" style=\"transition:color .15s;\" style-hover=\"color:#2fd4e6;\">Status<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1600}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const cyan = '#2fd4e6', amber = '#e6b73a', chrome = '#8b9499';\n    return {\n      year: new Date().getFullYear(),\n      services: [\n        { tag: 'MEDIA',   name: 'The Screening Room', desc: 'Movies, shows, and things I definitely own on physical media.', status: 'live', statusColor: cyan, uptime: '42d', meta: '4k · transcode' },\n        { tag: 'DNS',     name: 'Sinkhole',           desc: 'Network-wide ad blocking. Blocks roughly one billion trackers a week.', status: 'live', statusColor: cyan, uptime: '42d', meta: '1.1M blocked' },\n        { tag: 'GIT',     name: 'Mirror',             desc: 'A private git forge for half-finished repos I will absolutely come back to.', status: 'live', statusColor: cyan, uptime: '39d', meta: '87 repos' },\n        { tag: 'METRICS', name: 'The Dashboard',      desc: 'Graphs of graphs. Mostly here so I can watch the CPU line wiggle.', status: 'live', statusColor: cyan, uptime: '42d', meta: 'grafana' },\n        { tag: 'LAB',     name: 'Sandbox VM',         desc: 'Where new things get spun up, broken, and destroyed before breakfast.', status: 'rebuild', statusColor: amber, uptime: '2h', meta: 'ephemeral' },\n        { tag: 'BACKUP',  name: 'The Vault',          desc: 'Nightly snapshots of everything above. The one service I actually maintain.', status: 'live', statusColor: cyan, uptime: '42d', meta: '3-2-1 rule' },\n      ],\n      notes: [\n        { date: '2026 · 06', title: 'Rebuilt the whole rack over a weekend (twice)', tag: 'Hardware' },\n        { date: '2026 · 05', title: 'Teaching a Raspberry Pi to check on my plants', tag: 'Tinkering' },\n        { date: '2026 · 04', title: 'Why my DNS went down and took the lights with it', tag: 'Post-mortem' },\n        { date: '2026 · 03', title: 'A love letter to the humble reverse proxy', tag: 'Notes' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
